  # volatile: mount namespaces -- additional standard systemd system daemons
  - module: volatile
    rule_id: "Process in non-host mount namespace"
    process_in:
      - kdevtmpfs
      - systemd-timesyn # systemd-timesyncd, truncated comm
      - systemd-udevd
      - systemd-logind
      - switcheroo-cont # switcheroo-control, truncated comm
      - NetworkManager
      - ModemManager
      - upowerd
      - colord
      - low-memory-moni # low-memory-monitor, truncated comm
      - systemd-userdbd
      - systemd-userwor # systemd-userwork, truncated comm
      - fwupd
    reason: "Standard systemd PrivateMounts/PrivateDevices isolation for well-known system daemons"

  # volatile: UTS namespaces -- container runtimes and systemd PrivateHostname
  - module: volatile
    rule_id: "Process in non-host uts namespace"
    process_in:
      - bwrap
      - runc
      - containerd
      - dockerd
      - podman
      - lxc-start
      - systemd-nspawn
    reason: "Container runtimes and namespace-aware sandbox tools legitimately use private UTS namespaces"

  # volatile: UTS namespaces -- standard systemd system daemons (PrivateHostname=yes)
  - module: volatile
    rule_id: "Process in non-host uts namespace"
    process_in:
      - polkitd
      - accounts-daemon
      - rtkit-daemon
      - irqbalance
      - power-profiles- # power-profiles-daemon, truncated comm
      - systemd-timesyn # systemd-timesyncd, truncated comm
      - systemd-udevd
      - systemd-logind
      - colord
      - switcheroo-cont # switcheroo-control, truncated comm
      - systemd-userdbd
      - systemd-userwor # systemd-userwork, truncated comm
    reason: "Standard systemd PrivateHostname=yes isolation for well-known system daemons"

  # audit: udevadm forks udev-worker via prctl
  - module: audit
    rule_id: "Process binary mismatch"
    message_contains: "udev-worker"
    reason: "udevadm forks worker processes that rename themselves to udev-worker via prctl(PR_SET_NAME) — standard udev behavior"

  # audit: systemd-udevd comm / udevadm exe mismatch (systemd >= v249)
  - module: audit
    rule_id: "Process binary mismatch"
    message_contains: "systemd-udevd"
    reason: "On systemd >= v249 udevd is merged into udevadm; the process retains the systemd-udevd comm but the real binary is /usr/bin/udevadm"

  # persistence: DKMS kernel modules (out-of-tree taint is expected)
  - module: persistence
    rule_id: "Out-of-tree or unsigned kernel module"
    message_contains: "nvidia"
    reason: "Nvidia proprietary driver is always out-of-tree signed — expected taint"

  - module: persistence
    rule_id: "Out-of-tree or unsigned kernel module"
    message_contains: "vbox"
    reason: "VirtualBox kernel modules are out-of-tree — expected on virtualized hosts"

  - module: persistence
    rule_id: "Out-of-tree or unsigned kernel module"
    message_contains: "vmw"
    reason: "VMware kernel modules are out-of-tree — expected on VMware guests"

