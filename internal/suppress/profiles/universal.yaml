  # volatile: pathfinder SUDO_USER self-detection
  - module: volatile
    rule_id: "Suspicious process environment variable"
    message_contains: "SUDO_USER"
    process_in: ["pathfinder", "pathfinder_v-"]
    reason: "Pathfinder inherits SUDO_USER when invoked via sudo — expected self-artifact"

  # bodyfile: X11 display lock files
  - module: bodyfile
    rule_id: "Recent activity in volatile/hidden path"
    path_glob: "/tmp/.X*-lock"
    reason: "X11 server display lock files — standard when X server is running"

  # volatile: process CWD in /proc -- Firefox sandbox IPC
  - module: volatile
    rule_id: "Process CWD in staging directory"
    message_contains: "CWD=/proc/"
    process_in:
      - "Socket Process"
      - "Privileged Cont"
      - "RDD Process"
      - WebExtensions
      - "Utility Process"
      - "Isolated Servic"
      - "Isolated Web Co"
      - "Web Content"
    reason: "Firefox subprocesses fchdir() into /proc/<sibling>/fdinfo for sandbox IPC file descriptor passing"

  # volatile: process CWD in /proc -- rtkit-daemon
  - module: volatile
    rule_id: "Process CWD in staging directory"
    message_contains: "CWD=/proc"
    process_in: [rtkit-daemon]
    reason: "rtkit-daemon keeps CWD=/proc to read RT scheduling priorities from procfs -- expected behavior"

  # bodyfile: LTTng userspace tracer IPC semaphores in /dev/shm
  - module: bodyfile
    rule_id: "Recent activity in volatile/hidden path"
    path_glob: "/dev/shm/lttng-ust-wait-*"
    reason: "LTTng userspace tracer creates POSIX semaphores in /dev/shm for IPC; present on any system with liblttng-ust-linked applications"

  # bodyfile: Firefox profile data files with execute bit
  - module: bodyfile
    rule_id: "Executable in volatile/hidden path"
    path_glob: "/home/*/.mozilla/firefox/**"
    reason: "Firefox profile data files (e.g. times.json) occasionally inherit execute bits via permissive umask -- consistent with the existing Recent activity suppression for .mozilla/"

